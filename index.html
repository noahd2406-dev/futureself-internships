<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FutureSelf — Internships</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Fraunces:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F0F2F4;
      --surface: #FFFFFF;
      --border: #D5DAE0;
      --text-primary: #2C3E50;
      --text-secondary: #5D6D7E;
      --accent: #2C3E50;
      --accent-light: #E8ECF0;
      --accent-hover: #1A252F;
      --tag-bg: #EAEef1;
      --shadow-hover: 0 6px 28px rgba(44,62,80,0.15);
      --radius: 14px;
      --radius-sm: 8px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; }
    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 28px 40px; display: flex; align-items: center; gap: 16px; }
    .header-logo { font-family: 'Fraunces', serif; font-size: 22px; color: var(--accent); letter-spacing: -0.5px; }
    .header-divider { width: 1px; height: 24px; background: var(--border); }
    .header-subtitle { font-size: 14px; color: var(--text-secondary); }
    .container { max-width: 1080px; margin: 0 auto; padding: 40px 24px 80px; }
    .page-title { font-family: 'Fraunces', serif; font-size: 36px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.8px; }
    .page-subtitle { font-size: 15px; color: var(--text-secondary); margin-bottom: 32px; }
    .api-notice {
      background: var(--accent-light); border: 1.5px solid #b0bec5; border-radius: var(--radius-sm);
      padding: 14px 18px; margin-bottom: 24px; font-size: 13px; color: var(--accent-hover);
      display: flex; align-items: flex-start; gap: 10px;
    }
    .api-notice svg { flex-shrink: 0; margin-top: 1px; }
    .api-notice code { background: rgba(0,0,0,0.07); padding: 1px 5px; border-radius: 4px; font-size: 12px; }
    .api-notice a { color: inherit; }
    .search-row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .search-input-wrap { position: relative; flex: 1; min-width: 220px; }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); pointer-events: none; }
    .location-input-wrap { position: relative; min-width: 180px; }
    .loc-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); pointer-events: none; }
    input[type="text"] {
      width: 100%; padding: 12px 16px 12px 40px; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); font-family: inherit; font-size: 14px;
      background: var(--surface); color: var(--text-primary); transition: border-color 0.2s; outline: none;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: #ADADAD; }
    .btn-search {
      padding: 12px 24px; background: var(--accent); color: #fff; border: none;
      border-radius: var(--radius-sm); font-family: inherit; font-size: 14px;
      font-weight: 600; cursor: pointer; transition: background 0.2s; white-space: nowrap;
    }
    .btn-search:hover { background: var(--accent-hover); }
    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px; }
    .filter-chip {
      padding: 6px 14px; border-radius: 999px; border: 1.5px solid var(--border);
      background: var(--surface); font-family: inherit; font-size: 13px;
      color: var(--text-secondary); cursor: pointer; transition: all 0.15s; font-weight: 500;
    }
    .filter-chip:hover { border-color: var(--accent); color: var(--accent); }
    .filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .results-meta { display: flex; align-items: center; margin-bottom: 18px; }
    .results-count { font-size: 13px; color: var(--text-secondary); }
    .results-count strong { color: var(--text-primary); }
    .jobs-grid { display: flex; flex-direction: column; gap: 14px; }
    .job-card {
      background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius);
      padding: 22px 24px; display: flex; gap: 18px; align-items: flex-start;
      transition: box-shadow 0.2s, border-color 0.2s, transform 0.15s;
      animation: fadeUp 0.3s ease both;
    }
    .job-card:hover { box-shadow: var(--shadow-hover); border-color: #b0bec5; transform: translateY(-2px); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .job-logo {
      width: 48px; height: 48px; border-radius: 10px; background: var(--tag-bg);
      border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
      font-family: 'Fraunces', serif; font-size: 20px; font-weight: 700;
      color: var(--accent); flex-shrink: 0;
    }
    .job-body { flex: 1; min-width: 0; }
    .job-title { font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 3px; line-height: 1.3; }
    .job-company { font-size: 14px; color: var(--text-secondary); margin-bottom: 10px; }
    .job-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .tag { padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 500; background: var(--tag-bg); color: var(--text-secondary); }
    .tag.remote { background: var(--accent-light); color: var(--accent); }
    .tag.new { background: #FFF3E0; color: #B85C00; }
    .job-desc { font-size: 13.5px; color: var(--text-secondary); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .job-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; flex-shrink: 0; }
    .job-posted { font-size: 12px; color: #ADADAD; white-space: nowrap; }
    .btn-apply {
      padding: 9px 20px; background: var(--accent); color: #fff; border: none;
      border-radius: var(--radius-sm); font-family: inherit; font-size: 13px;
      font-weight: 600; cursor: pointer; transition: background 0.2s;
      text-decoration: none; display: inline-block; white-space: nowrap;
    }
    .btn-apply:hover { background: var(--accent-hover); }
    .loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 14px; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: var(--text-secondary); }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
    .empty-state svg { margin-bottom: 12px; opacity: 0.4; }
    .empty-state p { font-size: 15px; }
    .empty-state small { font-size: 13px; margin-top: 4px; display: block; }
    .pagination { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 36px; flex-wrap: wrap; }
    .btn-page {
      padding: 8px 16px; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      background: var(--surface); font-family: inherit; font-size: 13px;
      font-weight: 500; color: var(--text-secondary); cursor: pointer; transition: all 0.15s;
    }
    .btn-page:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .btn-page:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-page.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    @media (max-width: 600px) {
      .header { padding: 20px; }
      .container { padding: 24px 16px 60px; }
      .page-title { font-size: 28px; }
      .job-card { flex-direction: column; gap: 12px; }
      .job-actions { flex-direction: row; align-items: center; width: 100%; justify-content: space-between; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-logo">FutureSelf</div>
  <div class="header-divider"></div>
  <div class="header-subtitle">Powered by Hivebright</div>
</header>

<div class="container">

  <h1 class="page-title">Find Your Internship</h1>
  <p class="page-subtitle">Explore live opportunities matched to where you're headed.</p>
  <div class="search-row">
    <div class="search-input-wrap">
      <svg class="search-icon" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="keywordInput" placeholder="Role, company, or skill…" />
    </div>
    <div class="location-input-wrap">
      <svg class="loc-icon" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/>
      </svg>
      <input type="text" id="locationInput" placeholder="City or Remote" />
    </div>
    <button class="btn-search" onclick="runSearch()">Search</button>
  </div>

  <div class="filter-row">
    <button class="filter-chip active" data-type="internship" onclick="toggleChip(this)">Internship</button>
    <button class="filter-chip" data-type="remote" onclick="toggleChip(this)">Remote</button>
    <button class="filter-chip" data-type="part_time" onclick="toggleChip(this)">Part-time</button>
    <button class="filter-chip" data-type="full_time" onclick="toggleChip(this)">Full-time</button>
    <button class="filter-chip" data-type="entry_level" onclick="toggleChip(this)">Entry Level</button>
  </div>

  <div class="results-meta" id="resultsMeta" style="display:none">
    <div class="results-count" id="resultsCount"></div>
  </div>

  <div id="jobsContainer">
    <div class="loading-state">
      <div class="spinner"></div>
      <div class="loading-text">Loading internships…</div>
    </div>
  </div>

  <div class="pagination" id="pagination" style="display:none"></div>

</div>

<script>
  // ─────────────────────────────────────────────────
  //  CONFIG — Replace with your Adzuna credentials
  //  Free account at: https://developer.adzuna.com
  // ─────────────────────────────────────────────────
  const ADZUNA_APP_ID  = '69eaa437';
  const ADZUNA_APP_KEY = '485347abe52dfaf7f89b7dd86b520bc1';
  const ADZUNA_COUNTRY = 'us';
  const PER_PAGE = 10;

  let currentPage  = 1;
  let totalResults = 0;
  let totalPages   = 1;
  let activeFilters = new Set(['internship']);

  // Filter chip toggle
  function toggleChip(el) {
    const type = el.dataset.type;
    if (el.classList.contains('active')) {
      if (activeFilters.size === 1) return;
      el.classList.remove('active');
      activeFilters.delete(type);
    } else {
      el.classList.add('active');
      activeFilters.add(type);
    }
  }

  // Build keyword from inputs + chips
  function buildQuery(keyword) {
    const parts = [keyword || 'internship'];
    if (activeFilters.has('remote'))      parts.push('remote');
    if (activeFilters.has('entry_level')) parts.push('entry level');
    return parts.join(' ');
  }

  // Run a search
  function runSearch(page = 1) {
    currentPage = page;
    const keyword  = document.getElementById('keywordInput').value.trim();
    const location = document.getElementById('locationInput').value.trim();
    fetchJobs(buildQuery(keyword), location, page);
  }

  // Fetch live data from Adzuna
  async function fetchJobs(query, location, page) {
    showLoading();
    // Calls your Cloudflare Worker which handles Adzuna + CORS
    const params = new URLSearchParams({ page, what: query });
    if (location) params.append('where', location);
    if (activeFilters.has('full_time')) params.append('full_time', '1');
    if (activeFilters.has('part_time')) params.append('part_time', '1');

    const url = `https://apibeast.noahd2406.workers.dev/?${params}`;
    try {
      const res  = await fetch(url);
      if (!res.ok) throw new Error(`API error ${res.status}: ${res.statusText}`);
      const data = await res.json();
      renderJobs(data, page);
    } catch (err) {
      showError(err.message);
    }
  }

  // Render job card list
  function renderJobs(data, page) {
    const container = document.getElementById('jobsContainer');
    const meta      = document.getElementById('resultsMeta');
    const countEl   = document.getElementById('resultsCount');
    const jobs      = data.results || [];

    totalResults = data.count || 0;
    totalPages   = Math.min(Math.ceil(totalResults / PER_PAGE), 20);

    if (jobs.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2">
            <circle cx="12" cy="12" r="10"/><line x1="8" y1="12" x2="16" y2="12"/>
          </svg>
          <p>No internships found for that search.</p>
          <small>Try different keywords or location.</small>
        </div>`;
      meta.style.display = 'none';
      document.getElementById('pagination').style.display = 'none';
      return;
    }

    meta.style.display = 'flex';
    countEl.innerHTML  = `<strong>${totalResults.toLocaleString()}</strong> internships found &mdash; page ${page} of ${totalPages}`;

    container.innerHTML = '';
    const grid = document.createElement('div');
    grid.className = 'jobs-grid';
    jobs.forEach((job, i) => grid.appendChild(buildCard(job, i)));
    container.appendChild(grid);
    renderPagination(page);
  }

  // Build a single card element
  function buildCard(job, delay) {
    const card     = document.createElement('div');
    card.className = 'job-card';
    card.style.animationDelay = `${delay * 40}ms`;

    const company  = job.company?.display_name || 'Unknown Company';
    const location = job.location?.display_name || 'Location not listed';
    const isRemote = location.toLowerCase().includes('remote') || (job.title||'').toLowerCase().includes('remote');
    const daysAgo  = job.created ? Math.floor((Date.now() - new Date(job.created)) / 86400000) : null;
    const isNew    = daysAgo !== null && daysAgo <= 3;
    const desc     = (job.description || 'No description available.').replace(/<[^>]*>/g,'').slice(0,200) + '…';
    const applyUrl = job.redirect_url || '#';
    const salary   = job.salary_min && job.salary_max
      ? `$${Math.round(job.salary_min/1000)}k – $${Math.round(job.salary_max/1000)}k` : null;

    card.innerHTML = `
      <div class="job-logo">${esc(company[0].toUpperCase())}</div>
      <div class="job-body">
        <div class="job-title">${esc(job.title || 'Internship')}</div>
        <div class="job-company">${esc(company)} &middot; ${esc(location)}</div>
        <div class="job-tags">
          ${isRemote ? '<span class="tag remote">Remote</span>' : ''}
          ${isNew    ? '<span class="tag new">New</span>'       : ''}
          ${salary   ? `<span class="tag">${esc(salary)}</span>` : ''}
          ${job.contract_time ? `<span class="tag">${esc(job.contract_time.replace('_',' '))}</span>` : ''}
        </div>
        <div class="job-desc">${esc(desc)}</div>
      </div>
      <div class="job-actions">
        <span class="job-posted">${daysAgo === 0 ? 'Today' : daysAgo != null ? `${daysAgo}d ago` : ''}</span>
        <a class="btn-apply" href="${applyUrl}" target="_blank" rel="noopener">Apply &rarr;</a>
      </div>`;
    return card;
  }

  // Pagination controls
  function renderPagination(current) {
    const pg = document.getElementById('pagination');
    if (totalPages <= 1) { pg.style.display = 'none'; return; }
    pg.style.display = 'flex';
    pg.innerHTML = '';

    const prev = Object.assign(document.createElement('button'), { className:'btn-page', textContent:'← Prev', disabled: current === 1 });
    prev.onclick = () => runSearch(current - 1);
    pg.appendChild(prev);

    let start = Math.max(1, current - 2), end = Math.min(totalPages, start + 4);
    if (end - start < 4) start = Math.max(1, end - 4);
    for (let p = start; p <= end; p++) {
      const btn = Object.assign(document.createElement('button'), { className: 'btn-page' + (p===current?' active':''), textContent: p });
      const pp = p; btn.onclick = () => runSearch(pp);
      pg.appendChild(btn);
    }

    const next = Object.assign(document.createElement('button'), { className:'btn-page', textContent:'Next →', disabled: current === totalPages });
    next.onclick = () => runSearch(current + 1);
    pg.appendChild(next);
  }

  function showLoading() {
    document.getElementById('jobsContainer').innerHTML = `<div class="loading-state"><div class="spinner"></div><div class="loading-text">Searching internships…</div></div>`;
    document.getElementById('resultsMeta').style.display = 'none';
    document.getElementById('pagination').style.display  = 'none';
  }

  function showError(msg) {
    document.getElementById('jobsContainer').innerHTML = `
      <div class="empty-state">
        <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <p>Something went wrong.</p>
        <small>${esc(msg)}</small>
        <small style="margin-top:8px">Check your Adzuna App ID and App Key are correct.</small>
      </div>`;
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Enter key support
  ['keywordInput','locationInput'].forEach(id =>
    document.getElementById(id).addEventListener('keydown', e => { if (e.key==='Enter') runSearch(); })
  );

  // Auto-load on page open
  window.addEventListener('DOMContentLoaded', () => runSearch());
</script>
</body>
</html>
